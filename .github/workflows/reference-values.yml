name: Build Reference Values For CoCo Release

on:
  workflow_call:
  release:
    types: [published]

jobs:
  build-reference-values:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Setup oras
        uses: oras-project/setup-oras@v1

      - name: Build reference values JSON
        run: |
          CONFIG_PATH="versions.yaml"
          OUTPUT_PATH="results/reference-values.json"
          mkdir -p "$(dirname "$OUTPUT_PATH")"
          python3 release.py "$CONFIG_PATH" "$OUTPUT_PATH"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-values-json
          path: results/reference-values.json
          if-no-files-found: error

      - name: Generate SLSA attestation for reference values manifest
        uses: actions/attest@v4
        with:
          subject-path: results/reference-values.json
          push-to-registry: true

      - name: Upload JSON to GitHub Release
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          OUTPUT_PATH: results/reference-values.json
        run: |
          gh release upload "$RELEASE_TAG" "$OUTPUT_PATH" --clobber
